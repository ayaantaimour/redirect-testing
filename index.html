<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Please wait…</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  height:100vh;
  font-family: Arial, sans-serif;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1582379019160-24f19d611207?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;
  filter:blur(0px);
  animation:zoom 2s ease-in-out forwards;
}
@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.05);}
}
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
}
.content{
  position:relative;
  z-index:2;
  color:#fff;
  text-align:center;
}
.loader{
  margin:20px auto 0;
  width:45px;
  height:45px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>

<script>
setTimeout(function(){
  window.location.href = "https://lackingradiationpatsy.com/rsq740faqm?key=59054d241ce26556674e1500aa0b5592";
}, 2000);
</script>

</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
  <h2>Loading your content…</h2>
  <div class="loader"></div>
</div>

</body>
</html>
